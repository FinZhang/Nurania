。十三世纪末，阿布丹提亚在第一次阿索战争中落败，境内正教会于第二次宗教改革失败后宣布独立并成立公教会。十四世纪中叶，阿布丹提亚于第二次阿索战争中再度落败，作为和约条款之一帝国放弃对卡帕尼群岛的主权。两次战争失败使帝国丧失大量领土，国力遭到重创，帝国为团结国内贵族与新兴魔法阶层，经数十年权力再分配后于1393年建立三柱议会，和平演变为君主立宪制国家。帝国此后度过了一段快速发展的黄金年代，并于十五世纪的第三次阿索战争中击败索拉瑞斯帝国，收复了前两世纪丢失的部分领土。\n\n当代阿布丹提亚帝国被大多数学者视为大陆政治东极，在国际经济，政治和文化舞台都扮演着重要角色。阿布丹提亚是大陆第一大粮食出口国，与艾瑟瑞姆，卡帕尼都保持着长期贸易协议，服务业亦相当发达。十四世纪初以来，与艾瑟瑞姆王国建立的丹提亚-瑞姆技术协约有效提高了各类民生基础设施的星术魔法技术普及度，国民综合生活水平获得了长足进步。文化方面，丹提亚歌剧与油画享誉大陆，各帝政省在歌剧流派与绘画传统上形成了风格各异而传承稳定的地方体系。作为帝国的政治与文化中心，首都维尔迪亚歌剧院与画廊林立，素有“艺术之都”之称，每年吸引着数以万计的艺术爱好者。\n\n### 历史\n\n### 气候地理\n\n### 魔法与技术\n\n### 人口，民族与文化\n\n### 政治与军事\n\n### 经济\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$2\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"min-h-[60vh] flex items-center justify-center text-[var(--ink-muted)]\",\"children\":\"加载中…\"}],\"children\":[\"$\",\"$Lf\",null,{\"toc\":[{\"slug\":\"作者序\",\"title\":\"炉边随记（代作者序）\",\"titleEn\":\"Preface\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview\",\"title\":\"大陆总览 Overview\",\"children\":[{\"slug\":\"大陆总览 Overview/地理\",\"title\":\"地理概述\",\"titleEn\":\"The Geography\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/魔法\",\"title\":\"魔法概述\",\"titleEn\":\"The Magic\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/政治\",\"title\":\"政治概述\",\"titleEn\":\"The Politics\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/文化\",\"title\":\"文化概述\",\"titleEn\":\"The Culture\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"年表与大事记 Chronology\",\"title\":\"年表与大事记\",\"titleEn\":\"Chronology\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations\",\"title\":\"诸国列志 Chorography of the Nations\",\"children\":[{\"slug\":\"诸国列志 Chorography of the Nations/阿布丹提亚\",\"title\":\"阿布丹提亚帝国\",\"titleEn\":\"The Abundantia Empire\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/索拉瑞斯\",\"title\":\"索拉瑞斯帝国\",\"titleEn\":\"Imperium Solaris\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/忒奥西斯\",\"title\":\"忒奥西斯圣治领\",\"titleEn\":\"The θέωσις(Theosis) Dominion\",\"isArticle\":
