ildren\":\"$Le\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$f\",[]],\"S\":true}\n"])</script><script>self.__next_f.push([1,"10:I[53360,[\"/Nurania/next/static/chunks/6e3ce8e0c91f6804.js\",\"/Nurania/next/static/chunks/088430588bf85aac.js\",\"/Nurania/next/static/chunks/37a7b12706bcd5a9.js\"],\"default\"]\n11:T284d,"])</script><script>self.__next_f.push([1,"\n在波托马利旅居的这段日子，笔者养成了一个习惯：每天傍晚去谢兰港口旁的街上走走，看各国商船进出，码头的仓库灯火一盏盏点亮，耳边传来交易所收市的钟声，还有码头工人夹杂着五六种语言的互相吆喝。这座城市本身就是一个缩影——诺拉尼亚大陆经济格局最诚实的横截面。一亿六千万人，六个人类政权，此刻正以各自不同的方式运转着，而所有流动的财富、商品与人口，最终都会在这里汇聚片刻，然后再次散开。\n\n笔者并非经济学家，以下所论不过是一个旅行者的观察，聊供参考。\n\n### 一、三根柱子\n\n若要在结构层面理解当前大陆经济格局，最省力的方式是先找到那几个无法绕开的节点。在笔者看来，当前大陆经济秩序建立在三根柱子之上，缺少任何一根，整个体系都会以难以预料的方式坍塌。\n\n第一根柱子是**尼希尔的沙阿万大魔矿**。魔矿是大陆魔法产业的原材料，而大陆的魔法产业早已不是少数施法者的专属领域——它渗透进了农业、建筑、交通、军事、乃至日常生活的每一个角落。尼希尔一国产出全大陆逾半的魔矿总量，高品级魔矿更占八成以上。这个数字意味着什么，不需要复杂的推演：各国对尼希尔的经济依赖，在事实上构成了酋邦一道隐形的外交屏障。各国政府对尼希尔的奴隶制和活体献祭发表了多少年的谴责声明，又向沙阿万采购了多少年的魔矿——这两件事同时成立，并且会继续同时成立，直到某一天这根柱子以某种方式倒掉。\n\n第二根柱子是**卡帕尼的贸易与金融网络**。超过八成的大陆跨国贸易如今在以尼卡特或尼卡特汇票结算，四大商会的分部遍布各国口岸，卡帕尼银联的信用背书已经从商业领域蔓延到了战争融资——索拉瑞斯当前军备扩张所需的相当一部分资金，据笔者所知，正是通过卡帕尼的军事债券体系筹措的。一个体量不大的群岛联邦，以无可替代的金融基础设施地位，将自己深深嵌入了大陆所有重要经济事件的中间环节。这不是偶然，而是卡帕尼数代人精心经营的结果。在卡帕尼的商人眼中，战争是生意，和平也是生意，两者都有利可图，区别只是利润率不同而已。\n\n第三根柱子是**艾瑟瑞姆对星术技术的垄断**。星轨蚀刻技术使魔矿变成可以使用的能源，使魔法脱离施法者的存在独立运作——没有这道转化，沙阿万的魔矿只能是魔法师们手中的奢侈玩具，艾瑟瑞姆建立的普及全民的高技术社会也无从谈起。艾瑟瑞姆长期以来以严格的出口管制维持这一垄断地位，而这种垄断不仅是技术上的，更是制度上的——核心蚀刻工序由王家研究院直属机构把持，其余任何人、任何商会均无权染指。这道壁垒支撑了艾瑟瑞姆数百年的战略价值，也是丹提亚-瑞姆协约得以成立的根本前提。\n\n三根柱子，各有其脆弱之处。尼希尔的魔矿依赖奴隶劳动和微妙的酋邦部落政治；卡帕尼的金融网络依赖各国对贸易规则的尊重和彼此间的战略制衡；艾瑟瑞姆的技术垄断依赖知识的保密优势和王国的制度保证。三者目前均在运转，但笔者不是一个乐观的人。\n\n---\n\n### 二、刀剑胜于书\n\n大陆的军备竞赛并不是什么秘密。三战结束二十年，阿索两国都在以各自的方式为下一场战争做准备，区别只是一个口袋里的钱更多、另一个口袋里的钱更少。\n\n三战胜利让阿布丹提亚帝国的国际地位大幅上升，卡利曼七世的野心也随之更加清晰——不仅要守住已有成果，更要收复十三、十四世纪的失地。结束战争的卡斯特鲁姆和约将南西比尔平原大运河下游东岸的两座城池及其附属领土归还帝国，索菲亚大运河由此在纸面上成了两大帝国之间的一条边境线。但截至笔者下笔之时，两城的行政交接仍旧悬而未决；这块领土会如何改变阿布丹提亚对大运河贸易的影响力、又会在多大程度上进一步巩固帝国的粮食垄断地位，目前都还停留在大陆学界的预测中。\n\n为备战服务的军工扩张，不仅让阿布丹提亚在外交辞令上更显强硬，也重新塑造了国内的资源版图。军工产业对原材料的需求是无止境的：铁矿、麻类、木材、粮食，所有这些都在被军备逻辑重新定价。帝国境内近几年兴起的圈地运动也与此密切相关——贵族和魔法阶层合作，用大量进口的星术农业设备大规模提升土地产出，代价是大批农奴失去了土地。这些失地人口正在流向哪里，波托马利码头上日益增长的外来劳工数量已经给出了部分答案。\n\n索拉瑞斯的处境则更加复杂。三战失败不仅让帝国损失了本就有限的农业产地，更让凯撒的权威（再次）受到了沉重打击。雷尔金二世登基三十余年，长年以来以稳健治国著称，但稳健在这里是另一个词的委婉说法——他始终无法彻底解决帝国内部因继承内战留下的权威裂缝。扩军和鼓动复仇主义是转移国内矛盾最省力的手段，但扩军需要钱，而帝国财政正因为三战的损失和军备支出而承压。学界有观点认为索拉瑞斯会考虑对大运河商船增收通行费——考虑到两城交接至今悬而未决，帝国目前在事实上依旧完全控制着运河下游和入海口，这个推论并非没有依据。若此举成真，将直接影响凛冰洋—大运河—翡翠海峡这条魔矿主干航线的通行成本，所有依赖这条路线的国家都不会对此袖手旁观。\n\n在阿索两国的军备竞赛中，卡帕尼是那个始终面带微笑的旁观者。战时为双方转口贸易，战后为双方提供重建融资，如今又作为两国最大的进口需求供应方从备战热情中获利。笔者不打算在道德层面评价这种行为——那样的评价既不公平，也没有什么实际意义。但需要指出的是，如果一个国家从战争和战争准备中能够攫取如此巨大的利润，它的外交政策将越来越难以真正支持和平。卡帕尼的商人当然希望海峡平静、贸易繁荣，但他们同样希望阿索两国继续出售战争债券、依靠他们进口货物、用尼卡特在联邦的交易所里结算。这两种希望之间存在一种微妙的张力，但我们都知道当一者的利润压倒另一者时会发生什么。\n\n---\n\n### 三、新经济\n\n艾瑟瑞姆三战后的外交转型已经被充分讨论——不习者友好化改革、星术设备出口管制松动、对外开放技术人才出境。这些变化在经济层面产生了直接效益，同时也引发了一系列跨国层面的连锁反应（阿布丹提亚的圈地运动、大陆人口流动的加速等）。另一方面，卡帕尼因此得以进口大量星术设备和技术人才，并将相当一部分资源投入到了对蚀刻技术的深度研究之中。笔者曾在特贸区中见到过数处规模远超一般学术机构的研究设施，询问其开发项目时得到的答案含糊其辞。有消息称联邦期望在关键蚀刻技术环节上进行改进，以实现一种无需星术基础的普通工人也可操作的自驱动星术设备。这些消息的可靠性笔者无法确认，也无法排除其中有夸大成分。但即便只有一半是真的，其含义也值得严肃对待。\n\n艾瑟瑞姆的星术制度之所以能够形成大陆级别的技术垄断，根本在于施法者是不可或缺的生产要素——你可以进口星术设备，但无法进口施展星术这件事本身所需要的天赋和训练。这道门槛是艾瑟瑞姆几百年来技术壁垒的地基。如果卡帕尼真的找到了一种将这道门槛大幅降低的方法，那么三根柱子中的第三根将发生根本性的动摇。魔矿转化的生产力将从一种和星术施法绑定的“奢侈品”，变成一种任何拥有足够财富和足够劳动力的势力都可以复制的东西。\n\n如果把视角退得更远一些，我们会发现一个在日常讨论中常被忽略的事实：过去近几个世纪里，大陆的经济重心一直稳稳地锚定在中-东部平原带——阿布丹提亚的粮食产出、索拉瑞斯的工业与军事能力、忒奥西斯的宗教权威与运河控制权，共同构成了我们已经习惯的那套秩序。三战之后，这套秩序正在以肉眼可见的速度松动：索拉瑞斯的战略地位在下滑，阿布丹提亚的农业扩张引发的大规模人口流动正在冲淡中-东部平原原本封闭的劳动力结构，而卡帕尼则在悄悄积累一种尚难以命名的新型经济能量。\n\n若卡帕尼的星术研究真的取得突破，其影响将远远超出联邦自身生产力的跃升。一旦星术生产力从施法者人口规模的制约中解放出来，大陆其他国家赖以维持各自经济优势的护城河——无论是索拉瑞斯的冶铁技术壁垒、阿布丹提亚的农业规模优势，还是艾瑟瑞姆的技术垄断——都将不得不在新的经济格局下被重新估价。\n\n---\n\n今天波托马利的午后天气格外晴朗。笔者在谢兰港口的交易所门口驻足，看着进出行色匆匆的各国商人，看着进港停靠的船只上流水似的卸下货物，看着来往忙碌的码头工人脸上习以为常的表情。这座城市已经如此运转了一百多年，比起十年后的经济格局，绝大多数人对下一季的收入更感兴趣。这大约也是正常的。\n\n笔者在交易所门口站了大约一刻钟，然后决定回去写这篇文章。如果联邦的那些星术研究设施里真的发生了什么，大陆的经济运行逻辑或许会被彻底重塑，其分量将远超任何一场重新划分帝国边界的大陆战争。至于这会不会是件好事——笔者在那一刻没能想出答案，这篇文章写完了，依然没有。\n\n**塞勒内斯 于大陆历1502年四（金素）季42日 波托马利**\n\n**Selenus 1502.IV.42 In Porto Marino**\n"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$2\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"min-h-[60vh] flex items-center justify-center text-[var(--ink-muted)]\",\"children\":\"加载中…\"}],\"children\":[\"$\",\"$L10\",null,{\"bookSlug\":\"compendium\",\"toc\":[{\"slug\":\"作者序\",\"title\":\"炉边随记（代作者序）\",\"titleEn\":\"Preface\",\"isArticle\":true},{\"slug\":\"年表与大事记 Chronology\",\"title\":\"年表与大事记\",\"titleEn\":\"Chronology\",\"isArticle\":true},{\"slug\":\"度量与岁时 Measures and Times\",\"title\":\"度量与岁时\",\"titleEn\":\"Measures and Times\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview\",\"title\":\"大陆总览 Overview\",\"children\":[{\"slug\":\"大陆总览 Overview/地理\",\"title\":\"地理概述\",\"titleEn\":\"The Geography\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/魔法\",\"title\":\"魔法概述\",\"titleEn\":\"The Magic\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/经济\",\"title\":\"经济概述\",\"titleEn\":\"The Economy\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/政治\",\"title\":\"政治概述\",\"titleEn\":\"The Politics\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/文化\",\"title\":\"文化概述\",\"titleEn\":\"The Culture\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"诸国列志 Chorography of the Nations\",\"title\":\"诸国列志 Chorography of the Nations\",\"children\":[{\"slug\":\"诸国列志 Chorography of the Nations/阿布丹提亚\",\"title\":\"阿布丹提亚帝国\",\"titleEn\":\"The Abundantia Empire\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/索拉瑞斯\",\"title\":\"索拉瑞斯帝国\",\"titleEn\":\"Imperium Solaris\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/忒奥西斯\",\"title\":\"忒奥西斯圣治领\",\"titleEn\":\"The θέωσις(Theosis) Dominion\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/卡帕尼\",\"title\":\"卡帕尼诸公联合\",\"titleEn\":\"The United Principalities of Kapani\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/艾瑟瑞姆\",\"title\":\"艾瑟瑞姆王国\",\"titleEn\":\"The Kingdom of Aethyrium\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the N
