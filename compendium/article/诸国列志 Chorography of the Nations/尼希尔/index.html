ll,{\"children\":\"$Lc\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$2\",null,{\"name\":\"Next.Metadata\",\"children\":\"$Le\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$f\",[]],\"S\":true}\n"])</script><script>self.__next_f.push([1,"10:I[53360,[\"/Nurania/next/static/chunks/6e3ce8e0c91f6804.js\",\"/Nurania/next/static/chunks/3548cb099ad61741.js\",\"/Nurania/next/static/chunks/f81039c8341e0685.js\",\"/Nurania/next/static/chunks/088430588bf85aac.js\"],\"default\"]\n11:T40db,"])</script><script>self.__next_f.push([1,"\n\u003e “财富并不在于物质的富足，而在于灵魂的丰盈。”\n\n\n### 概述\n\n尼希尔伊玛目酋邦（The Nithil Imam-Chiefdom），通称尼希尔酋邦，是位于大陆西北角沙漠绿洲与两河流域的神权部落联邦国家，首都阿尔努尔。酋邦北面濒临凛冰洋，东北接忒奥西斯圣领，东南为连绵的脊冠山脉，南面与索拉瑞斯帝国接壤，西方则隔狂啸海与逆律岛相望。酋邦国土四百九十万平方陆里，由诸神圣土与八部落领地构成，最大城市为首都兼伊玛目城阿尔努尔（Al-Nur）。尼希尔全年气候干燥少雨，日照强烈，农业高度集中于两河沿岸的季节性泛滥平原，人口分布呈现明显的西密东疏格局。截止至大陆历1500年，尼希尔总人口约为一千八百万，其中超过八成居住于西部的纳赫尔河与哈亚特河流域。\n\n尼希尔两河流域被普遍视为诺拉尼亚大陆最早出现人类活动的地区，其历史可追溯至大陆历元前十世纪。早期西尼希尔地区曾长期分布着二十余个独立部落，各自崇拜不同神祇，在长期冲突与融合中逐渐形成具有共同仪式的诸神信仰。 同一时期，大量战俘与奴隶被流放至东部沙漠拓荒，幸存者依托绿洲形成新的萨阿尔部落。大陆历元前二世纪，掌握秘术魔法的萨阿尔部全面入侵西尼希尔，历八年统一诸部，建立史称“萨阿尔血王朝”的政权。王朝统治时期对西部部落实行残酷的高压统治，史籍普遍认为超过四百万人在其间因被屠杀或献祭非正常死亡。大陆历五世纪，尼希尔爆发大规模起义，萨阿尔王朝覆灭。其后，诸部落酋长于阿尔努尔会盟，建立部落联邦体制，宣誓部族平等，永不内战，并推举诸神大祭司为伊玛目教长，统摄宗教事务并协调各部政治，此举被视为现代尼希尔酋邦的起点。此后近千年间，尽管部落间摩擦时有发生，但在教长协调斡旋下，整体政治格局保持基本稳定。\n\n尼希尔是当今大陆上唯一仍合法保有奴隶制的国家，社会等级高度固化。萨阿尔王朝时期，诸神信仰被引导与秘术魔法绑定，掌握秘术仪式的统治阶层被塑造为“神遴者”，以此为其政治支配赋予神圣合法性。该解释在酋邦建立后被有意保留以维持既有社会秩序。伊玛目教长在酋邦中地位超然，担任宗教领袖的同时作为酋长会议首席参与世俗政治，通常被视为尼希尔事实上的最高统治者。外交层面，尼希尔在大陆列国中地位独特：一方面，酋邦长期限制对外民间往来，其以活祭为基础的秘术魔法亦使其国际形象饱受争议；另一方面，尼希尔出产的贵金属和玉石工艺品享誉全大陆，沙阿万大魔矿更提供了超过半数的大陆魔法矿石产量，使各国不得不与其维持稳定的官方贸易关系。酋邦境内合法存在的奴隶制度亦间接催生了跨国地下人口交易网络，来自尼希尔的奴隶人口在部分国家的权贵阶层中秘密流通。\n\n### 历史\n\n### 气候地理\n\n酋邦领地分为截然不同的两部分。西部为纳赫尔河与哈亚特河冲积而成的两河流域，是酋邦农业与定居人口的集中地带：两河均为自南向北流向，纳赫尔河发源于索拉瑞斯境内的镜心湖，哈亚特河发源于冠脊山脉西脉北麓的积雪融水。两河于塔巴特交汇后继续北行注入凛冰洋，是酋邦西部定居文明的农业命脉。酋邦东部则为大陆最严酷的干旱地带——沙阿万大沙漠，地表资源匮乏，仅有冠脊山脉北脉北麓发源的两条小型沙漠河流维系着若干绿洲，地下则蕴藏着沙阿万大魔矿区。两河流域与东部沙漠之间存在荒漠草原过渡地带，不具农业价值，历史上在此区域活动的部落长期保持着游牧或半游牧的生活方式。酋邦北临凛冰洋，东北接忒奥西斯圣领，东南与南方分别以冠脊山脉北脉和西脉为界与希尔文诺及索拉瑞斯相邻，西方隔狂啸海与据传存在的逆律岛相望。\n\n酋邦整体属温带大陆性干旱气候，全境降水极为稀少，是大陆与湿润水汽最为隔绝的地区。南方冠脊山脉将来自南方海域的湿润气流彻底截断，山脉北坡雨影效果显著；北方凛冰洋只输出严寒与干燥；西方狂啸海洋流混乱，对西海岸的湿润影响年际波动大，无法构成稳定来源；东侧来自圣领方向的气流本已干燥，也无水气补充。沙阿万大沙漠由此成为大陆气候最为极端的地区：白昼酷热，夜间因缺乏云层与植被覆盖而急剧降温，昼夜温差可超过三十度，冬季亦可能出现低温乃至霜冻；北部凛冰洋海岸线气候严寒，冬季海面有季节性结冰，捕捞窗口仅集中于夏季短暂数月。两河流域的农业节律受冠脊山脉融雪主导：春季哈亚特河洪汛带来上游冲积土并补充土壤水分，随洪水消退而展开的播种是全酋邦农业的年度起点；夏季高温干燥，强日照下灌溉作物进入生长旺季；冬季河流水位最低，农业进入休眠。\n\n沙阿万大魔矿是酋邦在大陆经济体系中最具决定性意义的战略资源，年产量占大陆魔矿总产量半数以上，高品级魔矿产出比例更高达八成，几乎构成事实上的垄断，是酋邦在外交上得以长期特立独行的根本支撑。两河流域的外源灌溉农业孕育了两种最重要的作物：血麦耐旱耐贫瘠，原产于此后随贸易传播至大陆各地；甜叶莎耐旱喜强光照，在两河流域高温干燥的夏季生长旺盛，是大陆制糖业的主要原料来源。海产方面，酋邦历史上深度参与凛冰洋冷水海域的捕捞作业，稀有高端海产长期以奢侈品形式输向大陆权贵阶层。\n\n### 魔法与技术\n\n酋邦几乎不存在星空魔法师与神启魔法师，对外国人的严格限制使外来魔法力量几乎无从渗入。全国施法者均属于掌握秘术的统治阶级，即宗教叙事中的\"神遴者\"，人数不足五十万，与普通民众之间存在不可逾越的制度与宗教壁垒。\n\n神遴者一般不参与常规产业生产，其秘术的运用主要集中于军事国防与宗教祭祀等仪式性场合。教长亦会适时组织神遴者参与重要的基建工程，包括水利设施、矿井开凿与大规模民用建筑等——此类工程除具有实际建设功能外，也起到向民众展示神遴者神圣力量、强化统治合法性的仪式性作用。\n\n### 人口，民族与文化\n\n酋邦的土地与矿藏由部落统治阶层——各部酋长及其下神遴者阶层——持有，分配给自由民进行耕作与生产，并按惯例收取税赋。酋邦总人口约一千八百万中，约六百万为奴隶，占比约四成，是沙阿万大魔矿区及各类农业庄园的绝对生产力主体。自由民通过出卖劳动补充奴隶劳动力的不足部分。手工业在统治阶级所拥有的土地上以私人形式运作，不存在行会组织。酋邦对外国定居人口实施严格限制，人口流动管控在大陆诸国中最为封闭，这一状态是维持现行奴隶制度的基本前提之一。\n\n### 政治与军事\n\n尼希尔伊玛目酋邦是政教合一的神权部落联邦。最高元首称**伊玛目教长**，同时担任酋邦宗教领袖与最高世俗权威，终身制，非世袭。教长继承以委任方式进行：每代教长亲自选定并教导一批神遴者学生，择其中最优秀者为继承人，以秘术密封的诏书载明委任，诏书于教长去世时方才解密。这一过程被视为酋邦最重要的宗教仪式之一，完全由教长一人掌控，不受外部干涉。诏书内依次列有三至五位继承人，若首位指定者去世或因故无法就任，则依次顺延；若教长在立诏前骤然去世，则沿用上代诏书。现任教长为**贾法里二世**（1415 年生，1450 年就任）。\n\n酋邦最高权力机构为**酋长会议**，由教长与各部落酋长（或其代表）组成，每年金素季在首都阿尔努尔召开，协商全酋邦外交、军事与内政事宜。教长在会议中担任首席，同时代表诸神圣土，影响力远超其他酋长。酋邦不设常设的中央行政与司法机构，跨部落事务若各方协商不决，则直接由教长处理。\n\n#### 诸神圣土与部落治理\n\n诸神圣土包含首都阿尔努尔及其周边大片耕地与城市，边界清晰，由教长及其座下祭司直接统治，行政与司法权力归教长本人。圣土内以宗教机构（神庙、神殿）及供养这些机构的平民产业城市为主体，另由各部落按比例出资供养。\n\n除圣土外，当代酋邦由八个部落领地构成，彼此边界相对模糊。历史上部落数量并不固定，自六个部落到十余个部落均有记录。酋邦虽保持整体和平，但部落分裂、迁移、合并时有发生。各部落酋长在领地内握有完整的行政与司法权威，对内政有极高独立性，仅向教长负责。酋长之下，大多数部落设有数名长老，共理部落事务；酋长或长老去世后，由在任长老在本部落神遴者中选举产生继任者。部分部落则仿照教长机制，由酋长亲自指定下一任人选。两种制度在酋邦框架内并行共存，互不干涉。无论采用哪种制度，酋长及长老均兼任本部落宗教领袖，同时具备神遴者身份——酋邦所有统治阶层，包括教长、诸神圣土祭司、各部落酋长与长老，无一例外皆为神遴者。\n\n#### 外交立场\n\n酋邦为维持现行制度，长期处于相对封闭的外交状态，严格限制外国人员进入。大陆各国普遍谴责酋邦的奴隶制与活体献祭，但受制于对沙阿万魔矿的高度依赖，均无力将外交压力转化为实质行动，被迫以官方渠道维持贸易关系。其中又以卡帕尼态度最为温和，是酋邦最大的贸易合作方。酋邦与希尔文诺几乎没有直接往来：精灵族对魔矿没有需求，其余贸易商品也多经卡帕尼等中间方转售，双方之间不存在正式贸易渠道。\n\n#### 军事体制\n\n酋邦军事编制对外高度保密，外界观察者既无法从贸易往来中获取信息，也无从借助战时记录加以印证——酋邦至今未参与任何大陆国际战争。以下为学界依据有限信息整理的推测性描述。酋邦军队按兵种大致分为两类：由奴隶与自由民构成的常规部队，称**众徒军**；由神遴者构成的魔法部队，称**神使军**。编制上，主力由各部落自行征召训练，另设教长直属的**神殿卫士**，其职能与圣领宗座卫队类似，不属于常规军事序列。\n\n#### 当代政治格局\n\n酋邦内部政治对大陆观察者而言几乎完全不透明。三次阿索战争均未对其造成直接冲击，酋邦延续了过往的封闭姿态，当代政治格局是否存在内部变化，外界无从评估。\n\n可供外部视角捕捉的唯一信号，来自贸易往来与边境聚落的零散记录：近年酋邦的贸易需求持续扩大，血票收取量似乎也在同步上升，指向某类宗教仪式的祭品需求正在增加。若此判断属实，酋邦内部自由民与奴隶所受的压榨，或将随之进一步加剧。\n\n### 经济\n\n采矿业是酋邦无可争议的经济支柱。沙阿万大魔矿区以奴隶劳动为主要生产力，持续输出大陆最重要的战略资源，魔矿出口是酋邦在大陆经济体系中最具决定性影响力的筹码，也是各国在外交谴责之外仍不得不维持对尼希尔贸易关系的根本原因。\n\n玉石与贵金属工艺品加工是酋邦另一具有大陆级声誉的产业。工匠以依附统治阶级的个体形式进行生产，出产的贵金属器皿与玉石制品以精工细作著称，广受大陆各国富有阶层与贵族偏好，是尼希尔除魔矿外最重要的高价值出口商品。制糖业依托甜叶莎的大规模种植占据大陆制糖产量的大头，凛冰洋的奢侈海鲜食品亦是面向大陆权贵阶层的稳定出口项目。酋邦凭借萨阿尔血麦的大规模种植实现粮食基本自给，进口需求主要集中于统治阶级的奢侈消费品，包括各国高端艺术品、精细工艺品、香料及各类稀有进口货物；第三次阿索战争后随艾瑟瑞姆出口政策松动，酋邦统治阶级亦有少量星术设备采购，主要用于个人消费与宫廷用途，而非产业生产。\n\n服务业方面，依附于统治阶级与富有自由民阶层的诗歌与舞蹈产业在酋邦较为发达，吟游诗人与职业舞者构成宫廷与贵族社交场合的重要文化组成部分，但这一产业对外几乎不开放，主要服务于内部消费。\n\n#### 货币、金融与财政\n\n尼希尔各部落各自铸造本部落货币，普遍含有少量黄金成分，因此对外统称**尼希尔金币**。各部落金币之间汇率不固定，彼此流通与兑换关系由实际交易决定，一般不被外界视为同一种货币体系。\n\n酋邦境内存在一种独特的等价支付形式，称为**血票**。其原理源于秘术的运作机制：活体生物含有远高于等重无生命物质的元素流价值，掌握秘术的神遴者能够直接利用这种元素流施法，因此在接受常规货物支付的同时，也接受民众以活物作为支付手段，且活物作为血票时的被接受价值高于其普通贸易品市场价格。以血票形式交付的活物或奴隶依照教义可合法用于祭祀仪式，这一点在尼希尔社会中被普遍接受。血票制度的实质是统治阶级借助经济激励使民众主动提供活体祭品，有效降低了社会张力，是尼希尔在维持高度血腥的秘术祭祀体系之下依旧保持统治稳定的关键机制之一。血票按需收取，当神遴者的施法祭品需求饱和时，活物仅按普通贸易品价值收受；将以普通贸易品价值收取的活物冒充血票祭品使用违反教义，被发现后将受到教长惩处。\n\n酋邦的金融体系极为原始。民间不存在银行机构，亦无存票债票等金融凭证，唯一接近金融业务的民间机构是当铺，以实物抵押换取实体货币。部落贵族、长老家族与宗教领袖之间存在一定规模的借贷关系，但不成体系，缺乏制度化管理。酋邦依托沙阿万大魔矿、贵金属玉石工艺品、制糖业、奢侈水产及地下奴隶市场，长期保持巨大的贸易顺差，统治阶级由此积累了可观的外汇储备，以卡帕尼尼卡特铸币及尼卡特汇票为主要形式持有。\n\n财政方面，民众以常规货物或血票形式向所属部落统治阶级缴税，部落是酋邦最高一级的财政单元。诸神圣土所属的宗教机构与伊玛目教长的议事机构，由各部落按比例出资供养，不直接向民众征税。若宗教仪式有大规模祭品需求，则由各部落依比例向民众额外征收血票，再汇集至宗教机构统一使用。\n\n#### 商业与贸易\n\n酋邦不存在任何形式的商会组织，跨国贸易完全由部落统治阶级掌控，民众无从参与。境内口岸有外国商会（主要为卡帕尼商会）的分部驻扎，其业务被限制在与当地统治阶级进行贸易。各国虽在外交上长期谴责尼希尔的奴隶制与活体献祭，但迫于对沙阿万魔矿的高度依赖，普遍被迫维持官方贸易关系，通常仅开放官方渠道，禁止民间私自与尼希尔从事贸易；卡帕尼外交立场相对温和，同时允许本国民间商会与尼希尔进行贸易往来。\n\n境内运输以沙阿万大魔矿区至两河区域的东西主干线为核心，魔矿产出经此输往酋邦核心区分拣后，依托发达的两河河运北上抵达凛冰洋出海口，或南下经陆路向索拉瑞斯方向跨国出口。大运河开通前，东部沙漠另有向东通往忒奥西斯的跨国陆路，大运河开通后随凛冰洋海运兴起而逐渐式微。魔矿出口的主干路线为凛冰洋航线：从两河流域出海口北上进入凛冰洋，沿凛冰洋向东抵达北门湾，再南下进入大运河，最终经翡翠海峡进入大陆主要贸易网。这条路线在大运河开通后迅速取代此前绕行大星洋的陆海联运路线，成为迄今最经济高效的魔矿出口通道。\n"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$2\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"min-h-[60vh] flex items-center justify-center text-[var(--ink-muted)]\",\"children\":\"加载中…\"}],\"children\":[\"$\",\"$L10\",null,{\"bookSlug\":\"compendium\",\"toc\":[{\"slug\":\"作者序\",\"title\":\"炉边随记（代作者序）\",\"titleEn\":\"Preface\",\"isArticle\":true},{\"slug\":\"年表与大事记 Chronology\",\"title\":\"年表与大事记\",\"titleEn\":\"Chronology\",\"isArticle\":true},{\"slug\":\"度量与岁时 Measures and Times\",\"title\":\"度量与岁时\",\"titleEn\":\"Measures and Times\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview\",\"title\":\"大陆总览 Overview\",\"children\":[{\"slug\":\"大陆总览 Overview/地理\",\"title\":\"地理概述\",\"titleEn\":\"The Geography\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/魔法\",\"title\":\"魔法概述\",\"titleEn\":\"The Magic\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/经济\",\"title\":\"经济概述\",\"titleEn\":\"The Economy\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/政治\",\"title\":\"政治概述\",\"titleEn\":\"The Politics\",\"isArticle\":true},{\"slug\":\"大陆总览 Overview/文化\",\"title\":\"文化概述\",\"titleEn\":\"The Culture\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"诸国列志 Chorography of the Nations\",\"title\":\"诸国列志 Chorography of the Nations\",\"children\":[{\"slug\":\"诸国列志 Chorography of the Nations/阿布丹提亚\",\"title\":\"阿布丹提亚帝国\",\"titleEn\":\"The Abundantia Empire\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/索拉瑞斯\",\"title\":\"索拉瑞斯帝国\",\"titleEn\":\"Imperium Solaris\",\"isArticle\":true},{\"slug\":\"诸国列志 Chorography of the Nations/忒奥西斯\",\
