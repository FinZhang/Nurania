### 概述\n\n索拉瑞斯帝国（Imperium Solaris），是位于诺拉尼亚中西部的军事集权帝制大国，首都索尔因维克图斯（通称索尔因）。帝国自东北至西南横跨西大陆三条主要山脉，北方与尼希尔伊玛目酋邦接壤，西临大星洋，东面阿布丹提亚帝国与忒奥西斯圣领，南临艾瑟瑞姆王国，东部则是鲜少人类涉足的诺万尼斯平原（终末碑座区域）。帝国国土一千零八十万平方陆里，划分为八个军团行省，超过七成是连绵的群山与原始森林，地势复杂，自然资源丰富。截止十六世纪初，索拉瑞斯全国常住人口大约为四千二百万，其中大部分集中于中东部的奥利提斯平原地区和西北部镜心湖沿岸地区，帝国最大城市为首都索尔因。\n\n大陆学界普遍认为索拉瑞斯地域的人类活动起源于大陆历一世纪前叶。由于地理阻隔，该地区的部落文明各自独立发展建立王国，其中最为强大的七国国王于328年建立了后世称为“七王约”的政治邦联。该邦联存续四个世纪，期间内部矛盾丛生，内乱不断。8世纪中叶，诺万尼斯大叛乱导致邦联彻底解体，西诺拉尼亚由此进入了王国乱战的黑暗时期。大陆历12世纪，索拉尔王国统一西大陆诸国，国王阿利昂受牧首册封成为第一代龙裔凯撒，开启了索拉瑞斯的集权帝国时代。作为政治交换，帝国东部的大陆中部领土被阿利昂捐献给教会，忒奥西斯圣领由此建立，成为索拉瑞斯的保护国。十三世纪和十四世纪的第一与第二次阿索战争中，帝国作为获胜方，获得了圣领南部的大片平原耕地领土与人口。十五世纪前叶，索拉瑞斯陷入了长达三十年的继承内战，凯撒的帝权受到了巨大削弱，此被普遍认为是其近代第三次阿索战争战败的诱因之一。\n\n自帝国时代确立以来，索拉瑞斯帝国始终是诺拉尼亚最具军事与政治影响力的的国家之一，并与阿布丹提亚帝国共同构成当代大陆格局的两极。帝国实行的军团-行省一体化制度可以有效地将国力转化为军力，其传承悠久的龙骑兵团常被视作大陆最精锐的作战部队之一。作为注重军事扩张的国家，索拉瑞斯在国际外交上也往往采用强势施压态度，与邻国尼希尔，艾瑟瑞姆，阿布丹提亚关系长期紧张。帝国尊正教为帝国国教，宗教氛围浓厚，超过八成公民是正教会信徒。索拉瑞斯帝国与忒奥西斯圣领签有单方面保证独立协议，并定期选派龙骑士接受牧首册封成为督教使。\n\n### 历史\n\n#### 部落时代与七王约的形成\n\n西诺拉尼亚的人类历史自早期便与居住于群山中的巨龙族相伴而生。早在大陆历一世纪，当地人类部落便已意识到这些强大而具备高度智慧的生物的存在，但龙族长期奉行疏离与不干涉原则，与人类社会保持距离，仅在极少数情况下与个体建立联系。龙族内部对人类相对亲和的个体，愿意与力量或精神特质受到其认可的人类缔结契约。随着部落规模扩大、冲突频发，这类契约为部落提供了决定性的军事优势，人类对强大战力的需求与龙族有限介入的意愿逐渐契合，龙骑士由此诞生。\n\n至四世纪，西诺拉尼亚进入被后世称为“七王约”的时代。多个王国在松散的邦联框架下并存，缺乏有效的跨山地与森林地形的行政与军事统合能力，内战与边境冲突频繁。此时，龙骑士已开始出现在区域性冲突之中，但其力量尚未被系统性地纳入世俗政权结构。与此同时，正教信仰通过传教士口述、典籍抄写以及神启魔法所展现的“神迹”在民间逐步传播。多数邦联成员国出于安抚民心与强化统治的考量，对宗教传播持默许乃至支持态度。依靠龙族契约同样能够施展神迹的龙骑士因此被正教会视为异端，虽因其强大战斗力而难以遭受直接迫害，但在舆论与声望层面长期受到排斥。\n\n#### 诺万尼斯大叛乱与黑暗时代\n\n至八世纪，长期处于宗教压力与政治边缘的龙骑士群体，与诺万尼斯王国结盟发动叛乱，试图驱逐正教会势力并统一七王邦联。在索瑞斯战役中，交战双方连续动用大规模神启魔法，引发严重的元素枯竭，导致整个诺万尼斯化为死国。直接死亡人口超过五十万，另有三百七十余万人流离失所。原王国疆域，即今日索拉瑞斯帝国东南部的诺万尼斯平原，因此亦被称为“终末碑座区域”。\n\n这一灾难性事件彻底摧毁了七王邦联的政治公信力，其体制随即瓦解。诺万尼斯枯竭也迫使正教会展开宗教改革，龙骑士群体在此过程中得到平反。于此同时，教会显著加强了对神启魔法的管理与垄断，几乎所有未经授权的施法行为均被列为异端。邦联解体后，西诺拉尼亚陷入长达数百年的多国混战。各政权竞相拉拢龙骑士作为战争核心力量，神启魔法在缺乏统一约束的情况下被频繁滥用，元素疏化现象在多处战场反复出现并持续恶化自然环境。大量边境城镇因此衰亡，当地人口被迫迁移，农业与手工业遭受严重破坏，文明发展明显倒退，西诺拉尼亚总人口在这一时期锐减。与此同时，完成宗教改革的正教会与龙骑士群体逐步和解，并借助动荡时期的精神需求进一步扩大在西大陆的信众规模。\n\n#### 索拉瑞斯帝国的建立与早中期发展\n\n至十二世纪，索拉尔王国完成对西诺拉尼亚诸国的军事统一，索拉瑞斯帝国由此建立。开国皇帝阿里昂被普遍认为是人龙混血，亦是当世最为强大的龙骑士之一，兼具压倒性的个人战力与卓越的军事、内政才能。其统一战争获得了正教会的全力支持，阿里昂接受牧首册封，成为首位“龙裔凯撒”，并尊正教为国教，此后历代皇帝皆沿袭这一加冕传统。作为政治交换的一部分，阿里昂将帝国东部大陆中央区域划拨予教会，协助建立忒奥西斯圣领，使帝国与教会的政治联系进一步加深。\n\n索拉瑞斯建国后，龙骑士以独立作战单位（龙骑士团）的形式被收编于帝国军事体制内，但其忠诚对象更多集中于具备龙族血统的凯撒本人，而非政治意义上的帝国。索拉瑞斯皇室借此也与诸龙骑士契约巨龙达成了平等的合作关系，作为合作关系的体现之一，巨龙陆续将各自的部分眷属交予帝国，龙骑兵部队得以正式编制，显著提升了帝国在复杂地形下的统治与投送能力。索拉瑞斯在这一时期完成了高度军事化的国家整合，确立了军团行省一体化的行政结构，为其后对外扩张奠定了基础。\n\n#### 三次阿索战争、内战冲击与当代格局\n\n十三世纪至十四世纪中叶，索拉瑞斯帝国对阿布丹提亚帝国发动了第一次与第二次阿索战争。凭借龙骑兵在机动性与战斗力上的压倒性优势，索拉瑞斯在两次战争中均取得胜利，尽管阿布丹提亚在第二次战争中已开始针对龙骑部队进行有限准备，但在龙骑士团压倒性的魔法力量前仍未能扭转战局。帝国由此夺取圣领南部原属阿布丹提亚的大面积平原耕地与人口，国力达到巅峰。\n\n十五世纪初，第七代龙裔凯撒意外驾崩，其子女中无人达到继承法所规定的龙血浓度标准。各大军团长遂以不同继承人名义相互征伐，龙骑士亦分属不同阵营参战，史称索拉瑞斯继承战争。内战持续三十年，严重消耗了帝国国力。最终，中辖军团在内战中获胜，原三皇子即位成为第八代龙裔凯撒。内战余波未平之际，索拉瑞斯在十五世纪后叶迎来了第三次阿索战争。阿布丹提亚依托黄金时代的制度整合成果，并通过与艾瑟瑞姆的合作，部署了专门针对龙骑兵团的军工器械与星术巨像，得以在正面战场抗衡索拉瑞斯军队。另一方面，帝国龙骑士团则几乎全程未有实质性参战，学界普遍认为这与内战后上位的凯撒合法性争议有关。作为结果，索拉瑞斯因无力支撑长期作战而被迫议和，丢失了索菲亚大运河下游东岸两座城市及其周边土地。\n\n战败后的索拉瑞斯一方面在正教会暗中支持下长期拖延条约规定的领土交接，另一方面积极整军备战，试图恢复受损的军事优势。随着地区紧张局势持续升温，第四次阿索大规模冲突已被学界普遍认为不可避免。\n\n### 气候地理\n\n帝国国土超过七成为连绵山地与原始森林，地形复杂，可耕平原极为稀缺。冠脊山脉的南脉与剑刃山脉完全位于帝国境内，是帝国南部的主要地形分隔线；裂境山脉呈南北走向纵贯帝国中部，是大陆冶铁产业最重要的铁铜矿藏富集带，亦是帝国东西地形的核心分界线。裂境山脉以东为奥利提斯平原，呈东北—西南走向的狭长地带，首都索尔因维克图斯位于平原西南角，索尔河流经其间，向东南注入艾瑟瑞姆境内的坠星湖；裂境山脉以西地势相对平缓，镜心湖居中，是帝国西部最重要的农业产区，亦是人口最为密集的区域之一。澄星湖位于帝国南部与艾瑟瑞姆接壤处，是两国的天然分界线。帝国东南部的诺万尼斯平原（终末碑座区域）是大陆历758年元素枯竭事件的遗址，平原自此永久化为死地，天气现象完全消失，索拉瑞斯、忒奥西斯与艾瑟瑞姆三国均将其划定为禁入区。希尔文诺大森林与帝国北部接壤，精灵族明确要求各国不得入内开发，帝国官方对此保持着表面上的默许。\n\n帝国整体气候湿润，但地形复杂带来高度分化的局地气候，从温和宜居的西部湖区到终年积雪的高山地带，气候跨度相当大。大星洋西岸偏暖的洋流携湿润气流沿大陆西岸北上，遇裂境山脉与冠脊山脉被迫抬升，在山脉西坡产生大量地形雨，是帝国超过五成森林覆盖率的核心水分来源；翻越山脉后，气流水汽大幅消耗，奥利提斯平原因此落入裂境山脉的雨影区，气候较镜心湖区偏干。镜心湖湖区受大星洋暖流直接调节，是帝国内气候最温和宜居的地带，湖体进一步平抑温差，冬季温和夏季凉爽，是帝国最重要的农业区赖以维持的气候基础。冠脊山脉与裂境山脉的山林地带凉爽湿润，冬季多雪，高海拔区域常年积雪，各行省之间的陆路联系在山地封雪期间受阻，是军团行省高度自给自足的制度逻辑的客观成因之一。帝国冠脊山脉与剑刃山脉一带海拔最高，终年凉爽，冬长夏短，是林业资源最集中的区域。\n\n镜心湖湖区温和湿润的气候保证了索拉瑞斯一定程度上的农业自产能力，但受制于山地压缩的可耕地规模，帝国粮食产出长期不足以自给，须依赖进口补足缺口。帝国全境森林覆盖率超过五成，木材储量冠绝大陆；凉湿山地同时孕育了丰富的菌类与林生动物资源，毛皮制品、油脂类产品是稳定的出口物产；冠脊剑麻适应山地丘陵地形，广泛分布于帝国南部山区。裂境山脉沿线铁、铜等金属矿藏储量丰富，是大陆冶铁产业最重要的原料来源；帝国金矿产出极为有限，这一资源现实直接促成了以铁质为基础的独特货币体制。\n\n### 魔法与技术\n\n帝国施法者约占总人口一成，多与正教会神职人员身份重叠。这部分人口在制度上向圣领及地方教会组织负责，而非直接纳入帝国军事指挥体系。然而依据索拉瑞斯与圣领之间的协定，行省政府发出的调度指令只需经负责教会审核确认不违反教义，即可有效调动境内施法者资源，效果与帝国直接管辖无异。针对紧急军事目的的调动设有但书条款，允许先行调动、事后审查。考虑到帝国与牧首厅的历史性紧密关系，这套机制在实践中运转顺畅，至少在明面上从未出现过调度需求被教会拒绝的记录。\n\n### 人口，民族与文化\n\n帝国实行军团行省制，土地归属于军团，农业生产以集体分配形式运作，农民按计划耕种、按计划分配产出。城市产业亦依循类似的军民一体化组织逻辑，劳动力的人身自由受到军事化体制的严格限制，跨境与跨区域流动均受管控。帝国民间商业活动被压缩至极低水平，商人以分散的个体户形式存在，几乎不存在跨地区的自发市场贸易，这一现实与帝国高度计划化的经济结构相互强化。\n\n### 政治与军事\n\n### 经济\n\n索拉瑞斯的经济核心是冶铁与铸造业。裂境山脉丰富的铁矿资源催生了大陆最成熟的金属加工体系，武器、甲胄、农具与工具的制造水平居大陆之首，铁矿原料与各类铁制成品均是帝国最重要的出口商品。武器与甲胄的出口对大陆各国设有总量限制，配额稀少且价格高昂；农具与工具类产品限制相对宽松。帝国的出口管制更多体现为总量控制而非定向封锁——对单一国家的定向禁令意义有限，因为任何国家均可经第三方市场间接获取。\n\n林业是帝国规模仅次于冶铁的产业支柱。木材加工、造船与建材生产依托全大陆最丰富的森林资源维持着可观的产出，艾瑟瑞姆等林地匮乏国家是重要的木材进口方。冠脊剑麻适应山地与丘陵地形，其加工产品——绳索、布料与麻袋等包装材料——是大陆同类商品的主要供应来源。依托丰富的森林猎物与山地草甸牧场，帝国的制革业与动物制品业亦相当发达，毛皮制品、角制品与油脂类制品均有稳定的对外出口。帝国的全部产业组织形式与农业高度一致，由各地军团行省政府直接组织生产，产出统一调配，呈现高度计划化的运作特征，不存在任何形式的工匠行会。\n\n服务业方面，帝国民间服务业整体极为简陋，与其高度军事化的社会结构相符。面向各级军官阶层的服务业则相当完善，会所、赌场、舞厅及骑术学校（含龙骑术训练）等设施在大城市中普遍存在，由行省政府直营，完全禁止平民进入，构成一套专属于军事贵族阶层的封闭服务体系。\n\n#### 货币、金融与财政\n\n帝国流通货币为**凯撒铁钞**与**凯撒铁筹**，以皇帝头衔命名，兑换比率为一比十。货币由帝国中央政府授权各军团分别铸造，几乎不含贵金属，以铁质为主体，依靠帝国发达冶铁产业支撑的复杂特殊铸造工艺防伪。伪造铁钞被视为对凯撒帝权的直接冒犯，惩罚极为严酷，是大陆对货币伪造处置最重的国家之一。忒奥西斯圣领的伊琳娜圣银币与分银币被允许在索拉瑞斯境内与铁钞等价自由流通，官方指定汇率维持一比一，体现了两国政治上的高度互信。\n\n索拉瑞斯的整体经济呈现高度计划化特征，军事强制力是经济运作的根本信用基础。帝国境内不存在民间银行及任何私人金融机构，储蓄与借贷的概念在民间几乎没有存在空间。官方名义上允许民众向本地正教会或跨境前往圣领教会进行储蓄借贷，但这一许可更多是帝国对教会亲善态度的象征性表态，实际利用者极少。帝国不发行任何形式的公债。行省政府之间存在一套灰色借贷网络，作为各地军团自发协调经济发展的非正式手段，被中央政府默许存在。\n\n财政体系与军团行省制度高度一体化。各行省产出由军团统一分配，其中一部分划入行省政府财政收入，行省再向帝国中央上缴部分作为中央财政来源。这一体系的运作效率高度依赖各军团的执行力度，中央对各行省财政的实际掌控程度因军团忠诚度与行省经济规模而有所差异。\n\n#### 商业与贸易\n\n帝国境内不存在商会组织，跨国贸易完全由军团官方垄断，不存在任何形式的民间跨国贸易。境内边境口岸有外国商会（主要为卡帕尼商会）的分部驻扎，其业务被完全限制在与当地官方军团政府进行贸易。对外贸易以卡帕尼尼卡特铸币及尼卡特汇票锚定结算。\n\n境内物流以镜心湖湖运和冠脊山脉与裂境山脉之间的狭长谷地陆运为主干，将西部镜心湖区的粮食与产出运抵首都地区和奥利提斯平原。帝国缺乏贯通东西两大人口核心区的大型河道，河运相对不发达，仅在镜心湖沿岸承担区域性贸易往来。海运方面，大星洋北部的西索拉瑞斯海岸航线贯通镜心湖湖区与帝国西南角边境城镇，是帝国西部的重要沿海补充路线。\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$2\",null,{\"fallb
