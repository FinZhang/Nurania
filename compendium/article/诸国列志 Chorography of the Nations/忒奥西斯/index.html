"Grimvolk\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"行观别录 Notes from the Road\",\"title\":\"行观别录 Notes from the Road\",\"children\":[{\"slug\":\"行观别录 Notes from the Road/魔法矿石\",\"title\":\"魔法矿石\",\"titleEn\":\"The Magic Ore\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"诸域纪闻 Chronicles of the Realms\",\"title\":\"诸域纪闻 Chronicles of the Realms\",\"children\":[{\"slug\":\"诸域纪闻 Chronicles of the Realms/龙不会老，但我会\",\"title\":\"龙不会老，但我会\",\"titleEn\":\"Dragons do not age, but me\",\"isArticle\":true},{\"slug\":\"诸域纪闻 Chronicles of the Realms/一趟远航，三本账册\",\"title\":\"一趟远航，三本账册\",\"titleEn\":\"One voyage, three ledgers\",\"isArticle\":true}],\"isArticle\":false},{\"slug\":\"旅记 Itinerary\",\"title\":\"旅记 Itinerary\",\"children\":[{\"slug\":\"旅记 Itinerary/阿布丹提亚篇\",\"title\":\"阿布丹提亚篇\",\"titleEn\":\"Folios of Abundantia\",\"isArticle\":true},{\"slug\":\"旅记 Itinerary/忒奥西斯篇\",\"title\":\"忒奥西斯篇\",\"titleEn\":\"Folios of Theosis\",\"isArticle\":true},{\"slug\":\"旅记 Itinerary/希尔文诺\",\"title\":\"希尔文诺篇\",\"titleEn\":\"Folios of Sylvanor\",\"isArticle\":true}],\"isArticle\":false}],\"currentSlug\":\"诸国列志 Chorography of the Nations/忒奥西斯\",\"article\":{\"slug\":\"诸国列志 Chorography of the Nations/忒奥西斯\",\"title\":\"忒奥西斯圣治领\",\"titleEn\":\"The θέωσις(Theosis) Dominion\",\"content\":\"\\n\u003e “信仰无根便是童话。”\\n\\n\\n### 概述\\n\\n忒奥西斯圣治领（The Theosis Dominion），通称圣治领或圣领(The Dominion)，是位于大陆中央北部地区的正教会神权共和国，首都圣城索菲亚。圣领北临北门湾，西北接尼希尔伊玛目酋邦，西南毗邻索拉瑞斯帝国，东北面葛林沃尔克的南北山脉与密林，东南则为阿布丹提亚帝国。圣领国土两百七十万平方陆里，划分为五个牧首区，最大城市为首都兼宗教中心圣城索菲亚。圣领大部分国土为地势平坦的稀树平原，适宜人口聚居。十四世纪索菲亚大运河竣工后，圣领人口快速攀升，截止至大陆历1500年，忒奥西斯全领公民人口已达一千五百万。\\n\\n基于唯一神信仰的正教会诞生于大陆历纪元一世纪，最早分布于西诺拉尼亚的索拉瑞斯地区，并逐渐传播至整个大陆。1159年，索拉瑞斯帝国开国皇帝阿利昂将帝国东部土地捐献给大牧首，正教会获得世俗领地成为政治实体，即为如今的忒奥西斯圣领。十三世纪末第一次阿索战争中，忒奥西斯作为索拉瑞斯帝国的盟友参战，战后领土东扩至葛林沃尔克山南脉山脚。此政治立场直接导致了正教会内部的第二次宗教改革尝试，失败后阿布丹提亚帝国境内正教会宣布独立，脱离牧首厅管辖成立公教会。十四世纪第二次阿索战争期间圣领维持了政治中立，同世纪后叶，忒奥西斯主动联合索拉瑞斯帝国开凿索菲亚大运河，其成为了历史上最庞大的人造工程之一。十五世纪后，圣领与索拉瑞斯帝国的关系再次趋于紧密，在第三次阿索战争中提供了除军事外的全面支持，引发了正教会与公教会的新一轮宗教外交冲突。\\n\\n忒奥西斯圣领诞生即成为大陆正教信仰的宗教中心，依靠各国庞大的信徒数量而具有强大的政治影响力。外交方面，原则应保持中立的牧首厅实际政治立场长期偏向索拉瑞斯帝国，在第一次阿索战争中的军事行动直接导致正教会大分裂，分裂后的丹提亚公教会与圣领正教会长期关系紧张。忒奥西斯绝大部分人口为正教信众的公民，非信众居民虽被允许在圣领境内正常生活和工作，但在诸多经济和政治权利上会受到限制。神启魔法与正教信仰的紧密联系亦使圣领垄断了大量优秀的祷言人才，其作用横跨军事防御与民用建设两端。直属牧首厅的圣仪军作为大陆最具规模的法术军事力量之一，除承担国防与宗教武装职能外，也被广泛用于大型民用工程建设，索菲亚大运河正是其最具代表性的成果。 \\n\\n### 历史\\n\\n### 气候地理\\n\\n### 魔法与技术\\n\\n### 人口，民族与文化\\n\\n### 政治与军事\\n\\n### 经济\\n\",\"titleImagePath\":\"/compendium/诸国列志/忒奥西斯.webp\",\"titleImageInsertLine\":3}}]}]\n"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"10:I[27201,[\"/Nurania/next/static/chunks/ff1a16fafef87110.js\",\"/Nurania/next/static/chunks/d2be314c3ece3fbe.js\"],\"IconMark\"]\n9:null\nd:[[\"$\",\"title\",\"0\",{\"children\":\"忒奥西斯圣治领 | The θέωσις(Theosis) Dominion\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"纪念塞勒内斯·尤里梅尔诞辰150周年系列文集\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/Nurania/icon.svg?icon.986a92ce.svg\",\"sizes\":\"any\",\"type\":\"image/svg+xml\"}],[\"$\",\"$L10\",\"3\",{}]]\n"])</script></body></html>
