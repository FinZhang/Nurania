ren\":[\"$\",\"$Ld\",null,{\"children\":[\"$\",\"$2\",null,{\"name\":\"Next.Metadata\",\"children\":\"$Le\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$f\",[]],\"S\":true}\n"])</script><script>self.__next_f.push([1,"10:I[53360,[\"/Nurania/next/static/chunks/6e3ce8e0c91f6804.js\",\"/Nurania/next/static/chunks/3548cb099ad61741.js\",\"/Nurania/next/static/chunks/f81039c8341e0685.js\",\"/Nurania/next/static/chunks/088430588bf85aac.js\"],\"default\"]\n11:T7f66,"])</script><script>self.__next_f.push([1,"\n度量衡与历法是大陆诸国往来交涉时最沉默却最不可或缺的语言。无论商旅记账、学者著述、贵族缔约还是军团调度，凡涉跨域之事，都须先在一套共通的尺度上落锚——尺度一旦相左，纸面之上的承诺便彼此无法对照。诺拉尼亚目前在跨国贸易、官方文书与学术交流中通行一套统一的度量与历法体系，这套体系并非自古即有，而是过去三个多世纪间逐步成型：通用历的源头是正教会的圣格里仪式历，经公教会世俗化、卡帕尼商人随贸易网络推广，至十五世纪初已为大陆主要政治实体广泛接受；度量衡方面，各项度量基本单位起源于不同国家的不同行业，各成其自，又在卡帕尼跨国贸易网络中被反复使用和推广，最终于十五世纪八十年代稳定为今日的大陆标准。\n须先行说明的是，本篇所述仅为这一官方层面的通用体系。在各国民间，本地旧度量衡与历法至今仍活跃于日常生活之中，本篇对此不予系统展开，仅在相关章节略作举例。另一方面，希尔文诺精灵族的历法与度量衡自成一系，与人类各国所行的体系判然有别，但其确切内容因希尔文诺整体封闭性所限，大陆学界迄今未能厘清。本篇下文所述精灵族章节，完全基于林缘议厅出具的少量文书，以及历年精灵-人类贸易记录所做的推断，其可靠性与代表性请读者自行斟酌。\n\n### 通用历\n\n大陆通用历，亦称格里历，源自正教会早期在西诺拉尼亚诸王国传教时所建立的圣格里仪式历，雏形可追溯至大陆历二世纪。该历法最初仅供教会内部宗教仪式使用，至十二世纪忒奥西斯圣领建立后被定为圣领官方历法，并随宗教传播迅速扩散至阿布丹提亚与卡帕尼。教会大分裂后，公教会沿用该历法的天文结构，但对其进行了世俗化改制，剥离了原有的宗教指代。这套世俗化版本在卡帕尼独立后随跨国贸易扩散，至十五世纪初已为大陆所有主要政治实体所接受，成为事实上的大陆通用历。\n\n#### 天文基础与时序层级\n\n通用历是一部太阳历，其基本时序由两套天体观测确定：太阳直射点回归大地一周的周期约三百日，月相完成一次盈亏循环的周期约五十日。因此通用历将一年划分为六季，每季五十日正好对应一次月相循环；每季再划分为五旬，每旬十日；每旬两周，每周五日。太阳回归周期与月相周期几乎精确呈六比一的整数关系，二者每千年的累积偏差大约只有一日，这意味着今日通用历距首次出现明显漂移仍有数个世纪。大陆各国已就这一漂移是否需要在未来引入校时机制展开过若干轮讨论，但至今未达成共识。\n\n一日（昼夜循环）之内的时间按算数均分为更小单位：一日十二等分为时，一时分四刻，每刻三十等分为分，一分六十等分为秒。旬这一单位主要用于民间口语，正式书面纪年中较少出现。各旬依次称上旬、前旬、中旬、后旬、下旬。\n\n#### 五曜日与天星\n\n通用历每周共五日，每一日对应天空中的一颗天体。这五颗天体即星空学派所称的\"天星五政\"，在正教会神学中则分别象征唯一神与四位最初的信徒——相传唯一神降世后行走大陆，圣约翰、圣伊琳娜、圣约瑟、圣保罗四人随行其后，神在第五日离去，将教义托付于先知与圣徒，由其分掌前四日教化信众，第五日为信众向唯一神礼拜之日。这一神学结构直接奠定了五曜日中前四日为劳作日、第五日（日曜日 / 圣神日）为礼拜日的安排。\n\n在公教会主导的世俗化版本中，五曜日各自的命名直接取自天星本名，也常常被进一步简称为星期一、二、三、四和星期日；而在圣领仍在使用的圣格里仪式历中，五日则各以神圣存在为名。下表归纳这一组连接星术魔法理论、正教神学与历法体系的对应关系（表中以天星五政之尊序排列）：\n\n| 天星本名 | 星空学派完整名         | 源星属性     | 神圣化身          | 圣领仪式历曜日 | 通用历曜日    |\n| ---- | --------------- | -------- | ------------- | ------- | -------- |\n| 太阳   | 主序·冠阳 Corona    | 权威、创造、审判 | 唯一神           | 圣神日     | 日曜日（星期日） |\n| 月亮   | 银杯·汐月 Thaluna   | 容纳、精神、教导 | 圣约翰（先知，弥赛亚）   | 圣约翰日    | 月曜日（星期一） |\n| 仲裁星  | 律令·仲裁星 Arbiter  | 秩序、守护、契约 | 圣伊琳娜（圣领货币名来源） | 圣伊琳娜日   | 裁曜日（星期二） |\n| 烬铸星  | 熔炉·烬铸星 Pyrakles | 转化、破坏、锻造 | 圣约瑟（商会之圣）     | 圣约瑟日    | 烬曜日（星期三） |\n| 织虹星  | 脉生·织虹星 Iris     | 修复、治疗、幻象 | 圣保罗           | 圣保罗日    | 虹曜日（星期四） |\n\n礼拜日制度在大陆所有受唯一神信仰影响的国家中均被遵循。圣领的礼拜日制度尤为严格，民间产业悉数停摆，仅维持基本的宗教与公共服务运转，相应地前四日的劳作压力较其他国家更重。阿布丹提亚、卡帕尼、艾瑟瑞姆与索拉瑞斯境内的城市自由民、商会与行会均按四劳一礼之节奏运行；阿布丹提亚等农业大国的农奴则按季而非按周劳作，礼拜日制度对其影响有限。尼希尔境内不存在此种休息制度，奴隶阶层全年劳作，自由民则随各部落本族传统行止。\n\n笔者注：圣领将商会冠以圣约瑟之名显然具有宗教解释上的意图，烬铸星常被视为星空之中的锻造炉象征，其属性是\"经由破坏完成的转化\"，而商业的本相同样是\"经由交换完成的价值转化\"，二者在精神内核上殊途同归。此联系是否系正教会刻意编织以提升商会的神学合法性，抑或是更深层的天体—神学共振，笔者暂无定论。\n\n#### 季名\n\n通用历六季在世俗版本与圣领仪式历中各有命名。世俗版本以自然时令为名，仪式历则以宗教意象为主，构成一条完整的礼仪年循环。下表列出二者对应：\n\n| 季次  | 世俗名称 | 仪式历名称 | 仪式神学含义                 |\n| --- | ---- | ----- | ---------------------- |\n| 第一季 | 启蛰   | 晖醒    | 唯一神唤醒沉眠之大地，信众灵魂随之觉醒    |\n| 第二季 | 清和   | 垂恩    | 神垂降恩典于众生，万物欣荣是神之见证     |\n| 第三季 | 炎阳   | 神焰    | 神之荣光于高天显耀至极，全年宗教活动最盛之时 |\n| 第四季 | 金素   | 圣献    | 以收获回馈神恩，年度最重要之礼仪季      |\n| 第五季 | 霜序   | 肃省    | 静默与反省，预备心灵迎接黑暗         |\n| 第六季 | 凛寒   | 正炼    | 于最深的黑暗中守持信仰，是神予信徒之考验   |\n\n各季气候节律因地而异——卡帕尼群岛的炎阳与凛寒之分远较阿布丹提亚平原为缓和，沙阿万沙漠则在金素至霜序之际昼夜温差最为剧烈，详见地理篇与各国分志的相应章节。\n\n#### 纪元与日期书写\n\n通用历以唯一神降临大陆传授教义于圣约翰之年为元年，记作\"大陆历元年\"或\"大陆历1年\"。元年之前的年份依次称\"大陆历元前1年\"、\"大陆历元前2年\"……如此类推；元年与元前1年相邻，二者之间不设零年。若无特殊指明，其他文章中所记年代均采用此一纪年体系，1503年即指唯一神降临之后的第一千五百零三年。\n\n通用历的元日被定为太阳高度最低之日过后第十天，为启蛰季1日（每年第一季第一日）。大陆绝大部分国家的官方新年节庆均定于此日，是民间最重要的节庆之一。\n\n正式书面格式：\"大陆历1503年金素季42日\"，亦可写作\"大陆历1503年四（金素）季42日\"以明确季次序数。学术与跨国贸易语境中年月日也常用古典字母和数字简写：\"1503.IV.42\"，其中 IV 代表第四季金素（来自萨辛历）。口语上日期月份则常用简称\"金素廿七\"、\"凛寒下旬\"等含旬位之表达。\n\n### 地方历法\n\n得益于太阳直射点回归与月相周期之间极为工整的天文比率，大陆各国所采用的地方历法在天文结构上与通用历几乎完全一致——同为太阳历或月亮历，同为六季五十日或六月五十日，分歧主要集中在纪元起算，岁首日与节令命名几个方面。各国地方历法之间的换算相当简便，大致只需进行纪元差的减法。下表列出通用历1503年所对应之各历纪年：\n\n| 历法         | 起源国         | 元年（大陆历）         | 1503年对应  | 岁首日（以通用历为参照） |\n| ---------- | ----------- | --------------- | -------- | ------------ |\n| 通用历 / 格里历  | 圣领（公教世俗化版本） | 1年（唯一神降临之年）     | 1503年    | 启蛰季1日        |\n| 圣格里仪式历/仪式历 | 圣领（正教原始版本）  | 1年              | 1503年    | 启蛰季14日       |\n| 穗时历        | 阿布丹提亚       | 386年（阿布丹提亚建国）   | 1118年    | 启蛰季1日        |\n| 星历         | 艾瑟瑞姆        | 1234年（艾瑟瑞姆王国建立） | 270年     | 启蛰季12日       |\n| 萨辛历        | 尼希尔         | 当代伊玛目即位之年       | 贾法里二世54年 | 凛寒季45日       |\n\n公教会对仪式历进行世俗化改制时，主要的参考蓝本是阿布丹提亚的穗时历，并出于普世化教义的考虑，同时吸收了其他地方历法的若干元素。最终成形的通用历中，岁首日与季名来自穗时历，曜日名取自星历，纪年简写格式则借鉴萨辛历。\n\n#### 圣格里仪式历\n\n圣领至今仍以原版圣格里仪式历（仪式历）为官方历法，与通用历的天文结构完全相同，在六季与五日的命名上则保留了教会的宗教语言（详见上文五曜日表与季名表）。圣领文书、教会典籍、宗教节庆与神学辩论中所引用的日期一律依此体系。仪式历的岁首日是唯一神传教义于圣约翰之日，当日即圣格里仪式历元年元日。\n\n圣格里仪式历同样是索拉瑞斯帝国的官方历法。西诺拉尼亚作为正教会最初的诞生地与传教地，本身即是全大陆正教信仰最浓厚的区域；索拉瑞斯统一后，龙裔凯撒须受大牧首册封的君权神授传统进一步强化了帝国政权与正教信仰的绑定，与圣领共用历法即是这种绑定最直接的表现之一。索拉瑞斯境内军政文书一律使用仪式历，仅在涉及跨国事务时以通用历并行书写。\n\n#### 穗时历\n\n穗时历是阿布丹提亚帝国的地方历法，也是公教会改制仪式历时最主要的参考蓝本。穗时历以帝国开国皇帝卡立曼·费内尔统一诸国建立帝政之年为元年，对应大陆历386年；其季名与岁首日定义皆与通用历完全一致。阿布丹提亚境内官方文书最初均使用穗时历，三柱议会成立后，帝国官方逐步以通用历替代穗时历用于跨国事务，但国内民事文书与传统庆典仍广泛使用穗时历至今。\n\n卡帕尼群岛在阿布丹提亚帝国统治时期也曾采用穗时历，独立后则全面转向世俗化的通用历——这一转变正是通用历得以扩散为大陆共通标准的关键契机之一。\n\n笔者注：卡帕尼独立并转用通用历发生于大陆历十四世纪中叶，而阿布丹提亚一直到十四世纪末议会成立后才开始逐步改用通用历。作为通用历的诞生地却并非第一个采用国，这背后是帝权大于神权的政治考量，还是单纯的大国制度惯性，至今仍是史学界讨论的课题之一。\n\n#### 星历\n\n艾瑟瑞姆王国所使用之星历是大陆唯一的月亮历——以一次月相循环为一月，五十日；六月成一年，三百日，与太阳回归相合。星历起源于王国建立前数百年间南下避难的星空学派学者群体，他们为记录月相变化与夜间星象观测之便而建立此历，后于王国建立时被定为官方历法。王国建立之年（大陆历1234年）即星历元年。\n\n星历的六月名称取自黄道之上的六个天宫——星空学派将整个天球划分为十二天宫，对应人体十二部位（详见魔法概述），其中只有六宫位于黄道带之上，太阳之路恰穿其中。六月依序为天宫月、船宫月、牧宫月、冕宫月、波宫月、琴宫月，分别对应天鹰宫、船帆宫、牧夫宫、冕冠宫、波江宫、竖琴宫之简称。星历元日为太阳进入天鹰宫的第一天，对应通用历启蛰季12日。\n\n星历于现今艾瑟瑞姆境内已不再是日常通用的历法。三战后艾瑟瑞姆政策转向开放，王国官方文书、跨国贸易、对外书信乃至大部分民间事务均已逐步采用通用历，星历仅在王家研究院的星术星象研究、占星仪式与天星师专业著述中保留使用。\n\n#### 萨辛历\n\n尼希尔伊玛目酋邦所实行的萨辛历是诺拉尼亚现存最特殊的历法，其名取自酋邦建立时推举的首任伊玛目阿比丁·萨辛。萨辛历的天文结构虽与通用历相同（太阳历，六季各五十日），但纪年方式则完全不同——萨辛历以当代伊玛目的称号纪年，每位伊玛目即位之年为该代纪年元年；伊玛目去世时纪年随之重置，由其继任者的称号开启新一代纪年。1503年所对应的萨辛历即\"贾法里二世54年\"，意为现任伊玛目贾法里二世即位至今的第五十四年。\n\n萨辛历的岁首日定于一年中太阳高度最低之日后的第四日（通用历凛寒季45日），是尼希尔宗教中一个完整循环的开始。其六季称呼依次为壹位、贰位、叁位、肆位、伍位、陆位，简写作 I、II、III、IV、V、VI，分别对应诸神信仰中的六位神祇（关于萨辛历岁首日和季名的详细定义，参见宗教概述篇）。\n\n这一历法体系意味着尼希尔民众对\"线性年代\"的概念远比其他大陆人民模糊，普通牧民与奴隶对一两代之前的历史几乎毫无具体的时间感知，所记之事往往只能落到某代伊玛目的某个时段。酋邦学者书写跨代历史时一般转用通用历以避免混乱。\n\n笔者注：这种对线性时间感知的整体淡漠，与尼希尔统治阶级对民众实施的封闭管理与思想控制不无关系——历史的连续感是反思政体的基础之一，淡化它便是淡化潜在的反抗。当然，这只是笔者一家之言。\n\n### 度量衡\n\n#### 度量衡的形成\n\n诺拉尼亚现行的通用度量衡体系并非源自任何单一国家，而是过去三个多世纪间由数个国家的不同产业领域各自贡献基础单位、最终在卡帕尼商人的跨国贸易网络中被合并使用而成形的。其各项单位的源流彼此独立，命名风格亦各保本色——长度单位起源于索拉瑞斯军团的行军距离衡量，重量单位起源于尼希尔魔矿场的矿砂称量，容量单位起源于忒奥西斯圣领的酿酒业，温度单位起源于艾瑟瑞姆王家研究院的魔矿蚀刻环境控制需求，海上航程单位则起源于卡帕尼自身的远洋贸易。卡帕尼商人在跨国贸易中反复使用并推广上述各国单位，最终促成它们在大陆精英层面的共通标准化。\n\n需再次指出的是，本篇所述度量衡仅为跨国贸易、官方文书与学术写作之标准。各国地方民间至今仍常常使用各自的旧度量衡——尼希尔市集以骆驼驮量衡量货物，阿布丹提亚乡间以亩衡量耕地，索拉瑞斯军团内部仍有\"长矛步\"等专属单位，等等。笔者于行旅之中常须依各地市井惯例临时折算，文书中亦不时遭遇旧制单位的称量。限于篇幅，本节不对这类旧度量衡做展开介绍。\n\n#### 长度\n\n长度的基本单位为步米，源自索拉瑞斯（及其前身索拉尔王国）军团标准行军步伐——一名军团士兵以行军节奏所迈一步之长。在西诺拉尼亚诸王国尚未被统一的十一世纪早期，步米即已被索拉尔王国用于军事公路的里程标记，索拉瑞斯帝国建立后沿袭了这一标准。更大的长度单位陆里同样源于索拉瑞斯军团传统：\"沿主干道每千步立一界石，称为一陆里\"。\n\n一陆里 = 一千步米\n\n一步米 = 十分步米 = 一百厘步米\n\n面积与体积单位以长度单位的平方与立方衍生，无独立命名。常用单位包括平方步米、平方陆里、立方步米、立方分步米等。各国分志所述国土面积均以平方陆里为单位计。\n\n#### 重量\n\n重量的基本单位为河磅，源自尼希尔两河流域沙阿万大魔矿场的矿砂称量传统。其确切定义为：三边长各为一分步米的标准容器装满纯水之重量。河磅的命名取自尼希尔两河——纳赫尔河与哈亚特河——之\"河\"，反映了其来自于两河绿洲政权的产业土壤。\n\n一河吨 = 一千河磅 = 十万河克\n\n一河磅 = 一百河克\n\n魔矿交易、贵金属铸币、香料药材等小批量精密称量场合多用河磅与河克；矿砂、谷物、铁料等大宗货物一般以河吨为计量单位。\n\n#### 容量\n\n容量的基本单位为圣加仑与圣品脱，源自忒奥西斯圣领的酿酒业。其定义以正教会标准发酵酒桶为基准——一标准酒桶之容量为一百圣加仑。\n\n一圣加仑 = 十圣品脱\n\n圣加仑主要用于酒类、油料、谷物等批量液体或散料贸易；圣品脱则常见于民间日常零售的油、酒、奶等小量交易。\n\n笔者注：圣加仑与圣品脱命名中的\"圣\"字源于其最早由教会修道院掌握并推广。教会大分裂后，此前缀虽已不再具有实质宗教意涵，在实际使用中更是常常被省略（加仑，品脱），但其名称已深植于大陆贸易语言之中。公教会与世俗商会均沿用两个单位至今，无人将其视为宗教冒犯。这是大陆度量衡形成史上\"宗教—商业互嵌\"的一个有趣注脚。\n\n#### 温度\n\n温度的基本单位为星度，源自艾瑟瑞姆王家研究院的魔矿蚀刻技术研究——蚀刻过程对环境温度极为敏感，须以高精度温度计量加以控制，星术学者因此发展出一套水基百分制温标。其定义以纯水的物态变化为基准：纯水在标准环境下凝结的温度为零星度，沸腾之温度为一百星度，其间均分一百单位。星度在魔矿蚀刻语境之外也被引入研究院其他学术场合，并随星术学者访问和星术设备出口逐渐扩散至精密工艺品加工，药剂生产和航海记录等特定领域。\n\n星度是大陆通用度量衡中一项普及度极低的单位。温度测量所依赖的星术设备——界星石温度柱、液柱温度计等——制造工艺复杂，成本昂贵，且需要星术施法者定期进行校准，因此其使用范围长期局限于特定国家（艾瑟瑞姆，阿布丹提亚和卡帕尼）的学术场合和精密加工行业。大陆绝大多数地方的民众毫无温度测量与度量概念，对气候之描述仍依赖于\"凉爽、温和、闷热、酷暑、严寒\"等定性词汇。各国分志气候章节所述气候带类型，亦均为定性表述而非以星度为基准。\n\n#### 海上航程\n\n诺拉尼亚早期航海长期采用航程日描述海上距离——一航程日即\"一艘标准商船在常规海况下昼夜不停所行之距离\"——此一传统至今仍是商船惯用单位。索菲亚大运河开通（大陆历1388年）之后，卡帕尼商人为更精密地计算运费与航期，将运河翡翠海峡入海口至贸易港波托马利之间顺洋流的直线航程平均切分为一百份，每份称为一海里。\n\n一海里 ≈ 三陆里\n\n大型帆船在常规海况下的巡航速度约为三至五海里每时，故大运河入海口至波托马利的基准航线在通常条件下约为一日有余之航程。海里作为通用单位虽已被官方文书与精算记账采用，但日常贸易语言中航程日的统治地位依旧不可撼动，尤其在跨海域、长距离航线之上——海上风浪变化无常，将之简化为整齐划一之线性距离不甚切实，航海家与船长们普遍依旧采用日数粗略估算。\n\n### 希尔文诺体系\n\n在开始之前需要再次提醒读者：本节的性质与前两节有较大不同。前述历法和度量衡部分都有充分的文献和一致的内部使用者可供查证；而本节内容则是基于极为有限的精灵族文书与历年贸易记录整理出来的推论汇编——其中许多判断只是学界目前的主流假说，部分则是笔者自己的推测。\n\n希尔文诺精灵族所行历法与度量衡，在人类学界通常被称为**希尔文诺体系**。这个名字概括了两部分内容，但它所依赖的材料其实分属两端：历法部分主要依赖于林缘议厅签署的官方文书，样本极少，因此学界对其细节争议较多；度量衡部分则因数百年来对外贸易中同批货物双重计量的惯例，形成了一套虽不知其源、但换算关系稳定的对照系。下文分别叙述。\n\n#### 圣树历\n\n精灵族官方历法称**圣树历**，林缘议厅签署的重要文书中所有涉及日期的部分都以人类历法和圣树历双落款。它的纪年尺度相比人类社会的各种历法较大，但由于可考的样本极少，人类学界对其全貌的把握至今相当粗陋。下表举三次阿索战争停战和约的双重落款（人类方历法已统一转算为格里历）为例，这也是目前最常被援引的几份圣树历样本：\n\n| 和约      | 通用历落款          | 圣树历落款                |\n| ------- | -------------- | -------------------- |\n| 维特拉和约   | 1292 年清和季 32 日 | 第四纪 叶茂 357 年 中春 31 日 |\n| 布兰顿和约   | 1356 年炎阳季 27 日 | 第四纪 叶茂 379 年 前夏 62 日 |\n| 卡斯特鲁姆和约 | 1483 年霜序季 38 日 | 第四纪 叶茂 420 年 后秋 52 日 |\n\n由这一类样本可以大致推得，圣树年与通用历年的换算关系约为一比三。在精灵历法研究的语境中，为与圣树年区别，通用历年也常被称为诺拉年或人类年——即一圣树年大致对应于三诺拉年。圣树年由三轮春、夏、秋、冬循环构成，分别以前、中、后为名，合为十二亚季，对应一圣树年内太阳三次回归。如果这一划分属实，则每亚季的长度应当在七十五诺拉日左右（300 日 × 3 ÷ 12 = 75 日）。但现有文书样本中，亚季中的日数最大也仅见六十余日，没有触及七十五日的预期上限——这或许只是样本不足造成的遗漏，也可能意味着圣树历并非整数周年均分为亚季的体系，又或者其中另有人类暂无从得知的置闰机制。\n\n第二件值得讨论的事是叶茂纪元的起算与命名。按一比三反推，叶茂元年大致对应通用历二世纪二十年代前后；那时大陆的人类世界还处在零散城邦与部落阶段，离与精灵族发生正式接触还有近一千年，没有任何同时期的人类记述能够帮助推断当时精灵族发生过什么足以构成纪元开端的事件。\"叶茂\"这一名称的来历同样不清楚，学界流传着几种假说，包括象征大圣树某段繁茂周期、纪念某代叶络枢机院的成立、源自某种与圣树共生的植物等。落叶精灵中愿意谈论此事的人极少，他们的描述也大多语焉不详。\n\n最后，\"第四纪\"这一前缀是圣树历中迷雾最重的部分。当前所有圣树历日期样本都以\"第四纪\"开头，历史学界对此的主流解释是：这一前缀修饰**叶茂**，即叶茂是精灵族纪年传统中的第四个纪元；如果每纪长度大致与叶茂纪元相当（约一千余诺拉年），则精灵文明史的总长度可粗略估算为五千诺拉年上下——笔者草列的年表中\"精灵族在距今约五千年前出现\"一说，正是由这一推算得来。但这一估算建立在没有任何内部信息源的基础上：第一、二、三纪具体是什么、各自有多长、是否如人类纪元那样以王朝、宗教或灾变为分界，都没有材料可考。落叶精灵对此一概讳莫如深，是受某种禁忌约束、是教义性的回避，还是他们本身也并不完全知情，同样不得而知。\n\n笔者注：在主流解释之外，还有一种更冷僻的推断值得一提，即\"第四纪\"未必是修饰\"叶茂\"的小尺度纪元层级，而可能是更大尺度上的世代标记——所谓\"第四纪叶茂\"，应读作\"**第四纪元的叶茂世**\"。如果这种解读成立，则今日所见的希尔文诺精灵属于其族裔历史上的第四代文明，在此之前已经存在过三代史前精灵文明，在冠脊山脉之间各自兴衰。如此推测则精灵文明总长可达数万诺拉年甚至更多。值得注意的是，同样栖居于冠脊山脉之中的另一长生种巨龙族，其个体寿命也可达五千诺拉年之久。两个长生种各自的历史长度都远超人类视野所及，而且都对自己的远古历史保持沉默——这是巧合，还是诺拉尼亚史前曾经存在过某段长生种共享、人类无从触及的世代？人类目前可考的文明史不过两千余年，所谓\"史前\"在人类学界基本指代部落—城邦阶段之前的一片模糊；如果希尔文诺与巨龙族的\"远古\"是另一套时间尺度，那么诺拉尼亚的历史可能还有人类完全没有接触过的更深层次。这一推测在人类历史学界几乎没有任何史料可供研究，因此长期以来是一个非常冷门的研究方向，本注仅作为一种可能性的提示列出，供读者参考。\n\n#### 精灵度量衡\n\n相比历法部分，希尔文诺体系的度量衡部分对人类学界要透明得多。历年来精灵-人类贸易对货物都需要进行双重计量，精灵方账目用精灵单位记录，人类方账目用通用单位记录，两侧账册并列已数百年。下表所列换算系数由历年贸易账目反复校核得出，几个世纪以来基本没有漂移，可以视为相当可靠的对照参考。\n\n**长度**\n\n1 露卡 = 1000 斯尔 ≈ 500 步米\n1 斯尔 = 100 分斯尔 ≈ 0.5 步米\n\n平方单位以**叶**为前缀，立方单位以**树**为前缀：1 叶斯尔 ≈ 0.25 平方步米，1 树斯尔 ≈ 0.125 立方步米。\n\n需要特别指出的是，\"分\"在希尔文诺体系中表示**百分之一**（1 分斯尔 = 1 斯尔 / 100），与人类通用单位中\"分\"表示十分之一（1 分步米 = 1 步米 / 10）的用法不同。这一错位经常让初学跨制换算的商人和学者出错，卡里司泰的会计行业为此留下了\"宁多记一遍，毋少记一位\"的行话。\n\n**重量**\n\n1 塔特 = 100 多特 ≈ 1.2 河吨\n1 多特 = 100 西特 ≈ 12 河磅\n\n1 西特约 12 河克，1 多特约 12 河磅，1 塔特约 1.2 河吨——重量级差均按百倍递进，是希尔文诺体系中与通用单位制最为接近的部分。\n\n**容量**\n\n1 赫略卡 = 20 怀略卡 ≈ 0.7 圣加仑\n\n容量单位仅此一组对照，而且基数是二十而不是一百，与希尔文诺体系长度、重量两部分都不一致。这种不齐是出于什么习俗——是某种仪式酒器的容量标准、是大圣树某段周期的天然分割，还是单纯的命名沿袭——同样无从查考。\n\n**时间**\n\n希尔文诺一日与人类一日等长——大陆精灵与人类共享同一片星空，昼夜节律自然没有差异。精灵族在贸易场合与林缘议厅文书中，所有涉及日内细分时刻的场合都采用人类体系的通用时分秒，没有出现任何独立的精灵日内单位。一个比较合理的推测是：精灵族日常生活中本就和人类大多数民众一样没有强烈的时分秒意识，只在少数需要精密计时的场合（例如某类仪式或施法）才动用细分时刻，而这类场合恰好没有流入人类视野；另一种可能是精灵族出于某种考虑刻意在对人类交流中将时间一律折换为通用单位。两种解释目前都没有可以证实的依据。\n\n贸易档案中还有一个现象值得指出——历年贸易记录上，精灵方似乎有意回避使用圣树历落款，仅以人类方的纪年记录交易日期；但这种回避在林缘议厅文书中却并不存在（如上文三份和约所示）。这一区别比较微妙：圣树历是否对使用场合有要求，只能见于具备一定礼仪规格的文书？还是对使用人员有要求，只能由特定身份的人书写？数量庞大的贸易档案本应是极为优良的历法信源材料，但由于希尔文诺的有意回避，目前学界不得不依赖于林缘议厅签署的、数量极少的官方条约进行相关研究，这种局面是否是精灵族有意为之，至今没有定论。\n\n笔者注：卡里司泰自由城市作为大陆唯一一处以希尔文诺体系与通用体系双轨并行为常态的地方，是观察精灵-人类度量衡对照系如何运转的最佳窗口。市集上\"三斯尔半\"与\"两步米\"会同时叫卖，\"一多特\"与\"十二河磅有余\"在同一柜台上彼此换算，店铺账册往往同页双栏；各国驻卡里司泰贸易机构的会计人员入职第一课，便是分清两种\"分\"——人类的\"分步米\"是十分之一步米，精灵的\"分斯尔\"则是百分之一斯尔。卡里司泰之外，整个大陆能同时熟练运用两套度量衡的人寥寥无几，哪怕落叶精灵也往往入乡随俗，在进入人类社会后便开始使用人类的单位体系：希尔文诺体系在人类社会中的渗透深度实际非常有限。\n\n::: fold 守密人注\n\n为方便现代读者参照诺拉尼亚世界观下的度量衡概念，特附本超世界观注节提供诺拉尼亚大陆与地球公制单位的对照换算，仅供参考。\n\n**长度、面积与体积**\n\n| 诺拉尼亚人类通用单位 | 地球公制对照    | 希尔文诺单位 | 地球公制对照     |\n| ---------- | --------- | ------ | ---------- |\n| 一厘步米       | 6 毫米      | 一分斯尔   | 3 毫米       |\n| 一分步米       | 6 厘米      | 一斯尔    | 0.3 米      |\n| 一步米        | 0.6 米     | 一露卡    | 300 米      |\n| 一陆里        | 600 米     | 一叶斯尔   | 0.09 平方米   |\n| 一平方陆里      | 0.36 平方公里 | 一树露卡   | 0.027 立方千米 |\n| 一立方步米      | 0.216 立方米 |        |            |\n\n**重量**\n\n| 诺拉尼亚人类通用单位 | 地球公制对照   | 希尔文诺单位 | 地球公制对照   |\n| ---------- | -------- | ------ | -------- |\n| 一河克        | 约 2 克    | 一西特    | 约 25 克   |\n| 一河磅        | 约 200 克  | 一多特    | 约 2.5 千克 |\n| 一河吨        | 约 200 千克 | 一塔特    | 约 250 千克 |\n\n**容量**\n\n| 诺拉尼亚人类通用单位 | 地球公制对照   | 希尔文诺单位 | 地球公制对照  |\n| ---------- | -------- | ------ | ------- |\n| 一圣品脱       | 约 200 毫升 | 一怀略卡   | 约 70 毫升 |\n| 一圣加仑       | 约 2 升    | 一赫略卡   | 约 1.4 升 |\n| 一标准酒桶      | 约 200 升  |        |         |\n\n**温度**\n\n星度与摄氏度同构（皆以纯水冰点为零度、沸点为一百度）：一星度即一摄氏度。\n\n**航程**\n\n| 诺拉尼亚人类通用单位 | 公制对照              |\n| ---------- | ----------------- |\n| 一海里        | 约 1.8 公里          |\n| 一航程日       | 约 60 公里（视船型与海况而异） |\n\n**时间与历法**\n\n诺拉尼亚之一日、一时、一分、一秒在数值上与地球几乎完全一致，设定上诺拉尼亚所在世界的自转周期与地球极为相近，本设定集中所有时间表述读者皆可径直按地球时间理解。\n\n诺拉尼亚之一年为三百日，和其所在世界的公转周期保持一致，地球年为三百六十五日有余，因此二者并非数值等价的单位。本设定集中\"大陆历1503年\"等纪年表述，仅在世界观内部作为时间锚点，不应直接换算为地球年代。\n\n:::\n"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$2\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"min-h-[60vh] flex items-center justify-center text-[var(--ink-muted)]\",\"children\":\"加载中…\"}],\"children\":[\"$\",\"$L10\",null,{\"bookSlug\":\"compendium\",\"toc\":[{\"slug\":\"作者序\",\"title\":\"炉边随记（代作者序）\",\"titleEn\":\"Preface\",\"isArticle\":true},{\"slug\":\"年表与大事记 Chronology\",\"title\":\"年表与大事记\",\"titleEn\":\"Chronology\",\"isArticle\":true},{\"slug\":\"度量与岁时 Measures and Times\",\"
